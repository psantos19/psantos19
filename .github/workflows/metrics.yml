name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub stats
        uses: lowlighter/metrics@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: psantos19
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Lisbon
          filename: github-metrics.svg
          committer_branch: output
          committer_message: "chore: update GitHub metrics"
          output_action: commit

      - name: Generate top languages
        uses: lowlighter/metrics@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: psantos19
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          filename: github-languages.svg
          committer_branch: output
          committer_message: "chore: update GitHub languages metrics"
          output_action: commit
